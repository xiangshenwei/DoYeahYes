name: Build Mac Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13   # 固定版本，比 macos-latest 稳

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-python pillow pyyaml pyautogui pynput

      # ✅ 避免 pyautogui / opencv 在无 GUI 环境炸
      - name: 🧯 Mock GUI environment
        run: |
          export DISPLAY=:0
          echo "DISPLAY=:0" >> $GITHUB_ENV

      # ✅ 打包（关键参数全部给你配好）
      - name: 🔨 Build with PyInstaller
        run: |
          rm -rf build dist
          pyinstaller main.py \
            --name auto-run \
            --add-data "images:images" \
            --hidden-import=cv2 \
            --hidden-import=PIL \
            --hidden-import=pyscreeze \
            --hidden-import=pygetwindow \
            --hidden-import=mouseinfo \
            --hidden-import=yaml \
            --collect-all cv2 \
            --noconfirm \
            --clean

      # ✅ 校验产物存在（防止“看似成功其实没生成”）
      - name: ✅ Verify build result
        run: |
          if [ ! -f "dist/auto-run/auto-run" ]; then
            echo "❌ build failed: binary not found"
            exit 1
          fi
          echo "✅ build success"

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-run-mac
          path: dist/auto-run/